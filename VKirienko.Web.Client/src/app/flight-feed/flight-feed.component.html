<div class="main-content">
  <div class="card">
    <div class="card-header card-header-success card-header-icon">
      <div class="card-icon">
        <i class="material-icons">send</i>
      </div>
    </div>
    <div class="card-body">
      @if (settings(); as settingsData) {
        <div class="pt-3">
          <a href="{{settingsData.adsbExchange.url}}{{settingsData.adsbExchange.userName}}" style="background-color:black;height:316px;font-size:45px" target="_new" rel="noreferrer">
            <img src="https://www.adsbexchange.com/wp-content/uploads/logo.svg" alt="ADS-B Exchange">
          </a>
        </div>
        <div class="pt-5">
          <a href="{{settingsData.adsbFi.url}}" target="_new" rel="noreferrer" class="adsb-fi">
            adsb.fi
          </a>
        </div>
        <div class="pt-5">
          <a href="{{settingsData.airplanesLive.url}}" target="_new" rel="noreferrer">
            <img src="https://airplanes.live/img/airplanes-live-logo.png" height="72" width="257" border="0" />
          </a>
        </div>
        <div class="pt-4">
          <a href="{{settingsData.flightAware.url}}{{settingsData.flightAware.userName}}" target="_new" rel="noreferrer">
            <img src="https://flightaware.com/images/logo60.png" height="60" width="160" alt="FlightAware Flight Tracker" border="0" />
          </a>
        </div>
        <div class="pt-5">
          <a href="{{settingsData.flightRadar24.url}}{{settingsData.flightRadar24.userName}}" target="_new" rel="noreferrer">
            <img src="//upload.wikimedia.org/wikipedia/en/thumb/8/84/Flightradar24_Logo.svg/250px-Flightradar24_Logo.svg.png" decoding="async" width="250" height="61" srcset="//upload.wikimedia.org/wikipedia/en/thumb/8/84/Flightradar24_Logo.svg/375px-Flightradar24_Logo.svg.png 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/8/84/Flightradar24_Logo.svg/500px-Flightradar24_Logo.svg.png 2x" data-file-width="205" data-file-height="50" alt="FlightRadar 24 Tracker">
          </a>
        </div>
        <div class="pt-5">
          <a href="{{settingsData.openSky.url}}{{settingsData.openSky.userName}}" target="_new" rel="noreferrer">
            <img alt="OpenSky Network" src="https://opensky-network.org/static/osky-logo-banner.png" style="border-style: none; width: 289px; height: 96px">
          </a>
        </div>
        <div class="pt-5">
          <div style="background: #3b4442; height: 62px; width: 300px">
            <a href="{{settingsData.radarBox.url}}{{settingsData.radarBox.userName}}" target="_new" rel="noreferrer">
              <img alt="AirNav RadarBox" src="https://cdn.radarbox24.com/img/assets/logo/airnav_rb_radar.svg" style="border-style: none; width: 256px; margin-left: 10px">
            </a>
          </div>
        </div>
      }
    </div>
  </div>
</div>
